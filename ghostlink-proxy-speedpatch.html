<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  GHOSTLINK PROXY SPEED PATCH                                     ║
  ║  Paste this entire block right before </body> in your HTML file. ║
  ║  It overrides the slow proxy functions with faster versions.     ║
  ╚══════════════════════════════════════════════════════════════════╝

  CHANGES:
  1. Pre-warms proxy (Scramjet + wisp fetch) in background on page load
  2. Parallelizes Scramjet init + BareMux connection (saves ~0.5–1s)
  3. Loading overlay only shows after 250ms delay (fast sites = no spinner flash)
  4. Fallback timeout reduced: 2000ms → 600ms
  5. Server health cached in sessionStorage (30s TTL, no repeated pings)
  6. Skip button shown immediately (not after a delay)
  7. Service worker config sent 3× to guarantee delivery
-->
<script>
(function () {
  'use strict';

  /* ─────────────────────────────────────────────────────────────
     1.  SERVER HEALTH  — sessionStorage cache (30 s TTL)
  ───────────────────────────────────────────────────────────── */
  window.checkServerHealth = async function (url, element) {
    const dot  = element.querySelector('.status-indicator');
    const text = element.querySelector('.ping-text');

    // Try cache first
    const cacheKey = 'gl_sh_' + url.replace(/\W/g,'').slice(-20);
    try {
      const c = JSON.parse(sessionStorage.getItem(cacheKey) || 'null');
      if (c && Date.now() - c.ts < 30000) {
        dot.className = 'status-indicator ' + (c.ok ? 'status-success' : 'status-error');
        text.textContent = c.ok ? c.ms + 'ms' : 'Offline';
        return;
      }
    } catch (_) {}

    const start = Date.now();
    const markResult = (ok) => {
      const ms = Date.now() - start;
      dot.className = 'status-indicator ' + (ok ? 'status-success' : 'status-error');
      text.textContent = ok ? ms + 'ms' : 'Offline';
      try { sessionStorage.setItem(cacheKey, JSON.stringify({ ok, ms, ts: Date.now() })); } catch (_) {}
    };

    try {
      const ws = new WebSocket(url);
      const t  = setTimeout(() => { try { ws.close(); } catch {} markResult(false); }, 2000);
      ws.onopen  = () => { clearTimeout(t); markResult(true);  try { ws.close(); } catch {} };
      ws.onerror = () => { clearTimeout(t); markResult(false); };
    } catch { markResult(false); }
  };

  /* ─────────────────────────────────────────────────────────────
     2.  LOADING OVERLAY — only show after 250 ms delay
         so fast navigations never flash a spinner
  ───────────────────────────────────────────────────────────── */
  const _origShowIframeLoading = window.showIframeLoading;
  const _pendingLoaders = new Map(); // tabId → timerId

  window.showIframeLoading = function (show, url) {
    const tab = window.getActiveTab ? window.getActiveTab() : null;
    const tabId = tab ? tab.id : -1;

    if (!show) {
      // Cancel any pending "show" timer
      if (_pendingLoaders.has(tabId)) {
        clearTimeout(_pendingLoaders.get(tabId));
        _pendingLoaders.delete(tabId);
      }
      // Hide immediately
      const loader = document.getElementById('loading');
      if (loader) loader.style.display = 'none';
      if (tab && tab.frame && tab.frame.frame) {
        tab.frame.frame.classList.remove('loading');
      }
      return;
    }

    // Defer showing the overlay by 250 ms — fast sites skip the spinner entirely
    if (_pendingLoaders.has(tabId)) return; // already queued
    const timerId = setTimeout(() => {
      _pendingLoaders.delete(tabId);
      const currentTab = window.getActiveTab ? window.getActiveTab() : null;
      if (!currentTab || currentTab.id !== tabId) return;
      if (!currentTab.loading) return;

      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.display = 'flex';
        if (tab && tab.frame && tab.frame.frame) {
          tab.frame.frame.classList.add('loading');
        }
        const titleEl = document.getElementById('loading-title');
        const urlEl   = document.getElementById('loading-url');
        const skipEl  = document.getElementById('skip-btn');
        if (titleEl) titleEl.textContent = 'Connecting';
        if (urlEl)   urlEl.textContent   = url || 'Loading content...';
        if (skipEl)  skipEl.style.display = 'inline-block'; // show immediately
      }
    }, 250);
    _pendingLoaders.set(tabId, timerId);
  };

  /* ─────────────────────────────────────────────────────────────
     3.  REDUCED FALLBACK TIMEOUT  (was 2000 ms → now 600 ms)
         Patch createTab to shorten the fallback timer
  ───────────────────────────────────────────────────────────── */
  const _origCreateTab = window.createTab;
  if (typeof _origCreateTab === 'function') {
    // We monkey-patch the fallback by intercepting frame load events
    // The actual fallbackTimeout inside createTab is replaced here:
    const _patchFrameTimeouts = () => {
      if (typeof tabs === 'undefined') return;
      tabs.forEach(tab => {
        // If a tab has an active loadFallbackTimeout pending at 2000ms,
        // there's no clean way to replace it — but new tabs will get the
        // patched version via the override in createTab below.
      });
    };
    _patchFrameTimeouts();
  }

  // Override createTab to reduce fallback timeout
  document.addEventListener('DOMContentLoaded', () => {}, { once: true });
  // Intercept future tab frame load/urlchange by patching the timeout constant
  // We achieve this by overriding loadFallbackTimeout on urlchange:
  const _tabFallbackMs = 600; // was 2000

  // Patch: whenever a urlchange fires on any new tab frame, reduce its fallback
  const _origCreateTab2 = window.createTab;
  if (typeof _origCreateTab2 === 'function') {
    window.createTab = function (makeActive = true) {
      const tab = _origCreateTab2(makeActive);
      if (!tab) return tab;
      // Override the fallback timeout that was just set inside createTab
      // by patching the frame's urlchange so future navigations use 600ms
      const origAddEvt = tab.frame.addEventListener.bind(tab.frame);
      // The urlchange listener is already attached inside createTab;
      // we attach a second one that fires AFTER to correct the timeout:
      tab.frame.addEventListener('urlchange', () => {
        if (tab.loadFallbackTimeout) {
          clearTimeout(tab.loadFallbackTimeout);
          tab.loadFallbackTimeout = setTimeout(() => {
            if (tab.loading) {
              tab.loading = false;
              clearTimeout(tab.skipTimeout);
              if (tab.id === window.activeTabId) window.showIframeLoading(false);
              if (typeof updateTabsUI   === 'function') updateTabsUI();
              if (typeof updateLoadingBar === 'function') updateLoadingBar(tab, 100);
            }
          }, _tabFallbackMs);
        }
      });
      return tab;
    };
  }

  /* ─────────────────────────────────────────────────────────────
     4.  PARALLELIZED proxyInit
         Replaces the sequential scramjet→connection steps with
         a parallel Promise.all, saving ~0.5–1 s on first load.
  ───────────────────────────────────────────────────────────── */
  window.proxyInit = async function () {
    const root = document.getElementById('proxy-app');

    const _piSteps = [
      { id: 'pi-s1', label: 'Fetching server list' },
      { id: 'pi-s2', label: 'Selecting fastest server' },
      { id: 'pi-s3', label: 'Loading proxy engine' },
      { id: 'pi-s4', label: 'Opening transport' },
      { id: 'pi-s5', label: 'Registering service worker' },
    ];

    root.innerHTML = `
      <div id="proxy-init-screen" style="
          display:flex; align-items:center; justify-content:center;
          width:100%; height:100%;
          background:var(--bg); font-family:var(--font);">
        <div style="
            text-align:center; max-width:340px; width:90%;
            padding:36px 32px;
            background:var(--card-bg);
            border:1px solid var(--accent);
            border-radius:16px;
            box-shadow:0 0 60px var(--accent-glow),0 0 20px rgba(0,0,0,0.8);
            backdrop-filter:blur(10px);">
          <div style="
              width:42px; height:42px; margin:0 auto 20px;
              border:3px solid var(--border);
              border-top-color:var(--accent);
              border-radius:50%;
              animation:spin 0.8s linear infinite;"></div>
          <div style="font-size:0.65rem; letter-spacing:3px; text-transform:uppercase;
              color:var(--accent); margin-bottom:20px; text-shadow:0 0 8px var(--accent-glow);">
            GHOSTLINK PROXY
          </div>
          <div style="display:flex; flex-direction:column; gap:10px; text-align:left;">
            ${_piSteps.map(s => `
              <div id="${s.id}" style="display:flex; align-items:center; gap:10px;
                  font-size:0.78rem; color:var(--text-dim); transition:color 0.3s;">
                <span id="${s.id}-icon" style="
                    width:18px; height:18px; flex-shrink:0; display:flex;
                    align-items:center; justify-content:center;
                    border:1.5px solid var(--border); border-radius:50%;
                    font-size:0.6rem; color:var(--text-dim); transition:0.3s;">○</span>
                ${s.label}
              </div>`).join('')}
          </div>
          <div id="pi-bar-wrap" style="
              height:3px; background:var(--border); border-radius:2px;
              margin-top:22px; overflow:hidden;">
            <div id="pi-bar" style="
                height:100%; width:0%; background:var(--accent);
                box-shadow:0 0 6px var(--accent-glow);
                transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
                border-radius:2px;"></div>
          </div>
        </div>
      </div>`;

    const _piMark = (stepId, state) => {
      const row  = document.getElementById(stepId);
      const icon = document.getElementById(stepId + '-icon');
      const bar  = document.getElementById('pi-bar');
      if (!row || !icon) return;
      const idx = _piSteps.findIndex(s => s.id === stepId);
      if (state === 'active') {
        row.style.color  = 'var(--text-primary)';
        icon.textContent = '◌';
        icon.style.borderColor = 'var(--accent)';
        icon.style.color       = 'var(--accent)';
        if (bar) bar.style.width = ((idx / _piSteps.length) * 100) + '%';
      } else if (state === 'done') {
        row.style.color  = 'var(--accent)';
        icon.textContent = '✓';
        icon.style.borderColor = 'var(--accent)';
        icon.style.color       = 'var(--accent)';
        icon.style.background  = 'rgba(110,203,255,0.12)';
        if (bar) bar.style.width = (((idx + 1) / _piSteps.length) * 100) + '%';
      }
    };

    // Build NT blob (unchanged)
    const ntTemplate = document.getElementById('nt-html-template');
    const _s = getComputedStyle(document.documentElement);
    const _g = v => _s.getPropertyValue(v).trim();
    const _cfLinks = Array.from(document.querySelectorAll('link[id^="custom-font-link-"]'))
      .map(l => `<link rel="stylesheet" href="${l.href}">`).join('');
    const _ntScript = `<script>(function(){var r=document.documentElement;
r.style.setProperty('--nt-bg',\`${_g('--bg')}\`);
r.style.setProperty('--nt-accent',\`${_g('--accent')}\`);
r.style.setProperty('--nt-accent-glow',\`${_g('--accent-glow')}\`);
r.style.setProperty('--nt-text-primary',\`${_g('--text-primary')}\`);
r.style.setProperty('--nt-text-dim',\`${_g('--text-dim')}\`);
r.style.setProperty('--nt-border',\`${_g('--border')}\`);
r.style.setProperty('--nt-card-bg',\`${_g('--card-bg')}\`);
r.style.setProperty('--nt-input-bg',\`${_g('--input-bg')}\`);
r.style.setProperty('--nt-font',\`${_g('--font')}\`);
r.style.setProperty('--nt-bg-image',\`${_g('--bg-image')}\`);
r.style.setProperty('--nt-bg-blur',\`${_g('--bg-blur')}\`);
r.style.setProperty('--nt-bg-brightness',\`${_g('--bg-brightness')}\`);
})();<\/script>`;
    let _ntHtml = ntTemplate.innerHTML;
    _ntHtml = _ntHtml.includes('<head>') ? _ntHtml.replace('<head>', '<head>' + _cfLinks + _ntScript) : _cfLinks + _ntScript + _ntHtml;
    const ntBlob = new Blob([_ntHtml], { type: 'text/html' });
    window.__ntBlobURL = URL.createObjectURL(ntBlob);

    const _slowTimer = setTimeout(() => {
      const screen = document.getElementById('proxy-init-screen');
      if (!screen || document.getElementById('pi-slow-banner')) return;
      const card = screen.querySelector('div');
      if (!card) return;
      card.style.maxWidth = '480px'; card.style.width = '90%';
      const banner = document.createElement('div');
      banner.id = 'pi-slow-banner';
      banner.style.cssText = 'margin-top:18px;padding:14px 16px;border-radius:10px;background:rgba(110,203,255,0.06);border:1px solid var(--accent);box-shadow:0 0 18px var(--accent-glow);text-align:left;';
      banner.innerHTML = `<div style="font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">Still loading…</div>
<p style="color:var(--text-dim);font-size:0.78rem;line-height:1.7;margin-bottom:10px;">Taking longer than usual. Common causes:</p>
<div style="display:flex;flex-direction:column;gap:8px;">
<div style="border-left:2px solid var(--accent);padding-left:10px;">
<span style="color:var(--text-primary);font-size:0.78rem;font-weight:bold;">Missing files</span>
<p style="color:var(--text-dim);font-size:0.76rem;line-height:1.6;margin-top:2px;"><code style="background:rgba(255,255,255,0.07);padding:1px 4px;border-radius:3px;">sw.js</code> and <code style="background:rgba(255,255,255,0.07);padding:1px 4px;border-radius:3px;">bareworker.js</code> must be in the root. Get them from <a href="https://github.com/virtuan4-max/ghostlinkhub" target="_blank" style="color:var(--accent);">GitHub</a>.</p>
</div>
<div style="border-left:2px solid var(--accent);padding-left:10px;">
<span style="color:var(--text-primary);font-size:0.78rem;font-weight:bold;">Insecure connection</span>
<p style="color:var(--text-dim);font-size:0.76rem;line-height:1.6;margin-top:2px;">Requires <strong style="color:var(--accent)">HTTPS</strong>.</p>
</div></div>`;
      card.appendChild(banner);
    }, 15000);

    const _showProxyError = (err) => {
      clearTimeout(_slowTimer);
      const root = document.getElementById('proxy-app');
      if (!root) return;
      root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;width:100%;font-family:var(--font);background:var(--bg);">
<div style="text-align:center;max-width:500px;width:90%;padding:32px;background:var(--card-bg);border:1px solid var(--accent);border-radius:16px;box-shadow:0 0 60px var(--accent-glow);backdrop-filter:blur(10px);">
<div style="font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;text-shadow:0 0 8px var(--accent-glow);">PROXY FAILED TO START</div>
<p style="color:var(--text-dim);font-size:0.8rem;margin-bottom:22px;line-height:1.5;">Make sure <code>sw.js</code> and <code>bareworker.js</code> are in your site root, and you're on HTTPS.</p>
<button onclick="proxyBrowserInitialized=false; nav('proxy');" style="padding:12px 30px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);font-weight:bold;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;">Retry</button>
</div></div>`;
    };

    try {
      // ── STEP 1: Fetch wisp server list ──
      _piMark('pi-s1', 'active');
      // Use pre-warmed result if available (set by background pre-warm below)
      if (!window.__wispPreWarmed) {
        await fetchWispServers();
      } else {
        // Already fetched in background — instant
        await window.__wispPreWarmed;
      }
      _piMark('pi-s1', 'done');

      // ── STEP 2: Select best server ──
      _piMark('pi-s2', 'active');
      await initializeWithBestServer();
      _piMark('pi-s2', 'done');

      // ── STEPS 3 + 4: Load Scramjet AND open transport IN PARALLEL ──
      _piMark('pi-s3', 'active');
      _piMark('pi-s4', 'active');

      await Promise.all([
        // Use pre-warmed Scramjet if available
        (window.__scramjetPreWarmed
          ? window.__scramjetPreWarmed.then(() => _piMark('pi-s3', 'done'))
          : getSharedScramjet().then(() => _piMark('pi-s3', 'done'))
        ),
        // Open BareMux transport concurrently
        getSharedConnection().then(() => _piMark('pi-s4', 'done'))
      ]);

      // ── STEP 5: Register service worker ──
      if ('serviceWorker' in navigator) {
        _piMark('pi-s5', 'active');
        const getBasePath = () => { const b = location.pathname.replace(/[^/]*$/, ''); return b.endsWith('/') ? b : b + '/'; };
        const reg = await navigator.serviceWorker.register(getBasePath() + 'sw.js', { scope: getBasePath() });
        await navigator.serviceWorker.ready;

        const wispUrl    = localStorage.getItem('proxServer') ?? DEFAULT_WISP;
        const allServers = getAllWispServers();
        const autoswitch = localStorage.getItem('wispAutoswitch') !== 'false';
        const swConfig   = { type: 'config', wispurl: wispUrl, servers: allServers, autoswitch };

        const sendConfig = async () => {
          const sw = reg.active || navigator.serviceWorker.controller;
          if (sw) sw.postMessage(swConfig);
        };
        sendConfig();
        setTimeout(sendConfig, 300);
        setTimeout(sendConfig, 1000);

        navigator.serviceWorker.addEventListener('message', (event) => {
          const { type, url, name, message } = event.data;
          if (type === 'wispChanged') {
            localStorage.setItem('proxServer', url);
            proxyNotify('info', 'Autoswitched Proxy', `Now using ${name}`);
          } else if (type === 'wispError') {
            proxyNotify('error', 'Proxy Error', message);
          }
        });

        reg.update();
        _piMark('pi-s5', 'done');
      }

      clearTimeout(_slowTimer);
      await initializeBrowser();
    } catch (err) {
      console.error('Proxy init error:', err);
      _showProxyError(err);
    }
  };

  /* ─────────────────────────────────────────────────────────────
     5.  BACKGROUND PRE-WARM
         Start fetching wisps + init Scramjet the moment the page
         loads — so by the time the user clicks Proxy, it's ready.
  ───────────────────────────────────────────────────────────── */
  function startPreWarm() {
    // Pre-fetch wisp server list
    window.__wispPreWarmed = fetchWispServers().catch(() => {});

    // Pre-init Scramjet (only if the CDN script has already loaded)
    if (typeof $scramjetLoadController !== 'undefined') {
      window.__scramjetPreWarmed = getSharedScramjet().catch(() => {
        window.__scramjetPreWarmed = null;
      });
    } else {
      // Wait for the deferred script then try again
      setTimeout(() => {
        if (typeof $scramjetLoadController !== 'undefined') {
          window.__scramjetPreWarmed = getSharedScramjet().catch(() => {
            window.__scramjetPreWarmed = null;
          });
        }
      }, 2000);
    }
  }

  // Fire pre-warm after the page's own onload has run (give it 500 ms)
  if (document.readyState === 'complete') {
    setTimeout(startPreWarm, 500);
  } else {
    window.addEventListener('load', () => setTimeout(startPreWarm, 500), { once: true });
  }

  console.log('[GhostLink] Proxy speed patch applied ✓');
})();
</script>
